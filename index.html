<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>What's Your Teaching Superpower?</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #FFF6E3;
    --card: #FFFDF6;
    --ink: #1B1730;
    --gold: #FFC93C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Baloo 2', sans-serif;
  }
  .display { font-family: 'Fredoka', sans-serif; font-weight: 700; letter-spacing: 0.2px; }
  .mono { font-family: 'Fredoka', sans-serif; font-weight: 500; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 64px 24px 80px; }
  .halftone {
    background-image: radial-gradient(var(--ink) 1.6px, transparent 1.6px);
    background-size: 14px 14px;
  }
  .panel {
    border: 3.5px solid var(--ink);
    box-shadow: 7px 7px 0 var(--ink);
    background: var(--card);
  }
  button { font-family: inherit; }
  .opt-btn { transition: transform .12s ease, box-shadow .12s ease; }
  .opt-btn:hover { transform: translate(-3px,-3px); box-shadow: 6px 6px 0 var(--ink); }
  .opt-btn:active { transform: translate(0,0); box-shadow: 2px 2px 0 var(--ink); }
  .pop-btn:hover { transform: translate(-3px,-3px) rotate(-1deg); }

  /* Landing */
  .landing-bg {
    min-height: 100vh;
    background: linear-gradient(180deg, rgba(255,246,227,0.35) 0%, rgba(255,246,227,0.97) 55%);
  }
  .landing-inner { display: flex; flex-direction: column; align-items: center; text-align: center; }
  .badge {
    background: var(--ink); color: var(--paper); padding: 5px 14px; font-size: 12px;
    letter-spacing: 2px; display: inline-block; transform: rotate(-1.5deg);
  }
  .hero-title-wrap { position: relative; display: inline-block; }
  .hero-burst {
    position: absolute; top: 50%; left: 50%; width: 150%; padding-bottom: 150%;
    transform: translate(-50%, -50%); border-radius: 50%; z-index: -1;
    background: repeating-conic-gradient(var(--gold) 0deg 12deg, transparent 12deg 24deg);
    opacity: 0.4;
  }
  .hero-title {
    position: relative;
    font-size: clamp(2.6rem, 8vw, 5.2rem);
    line-height: 1.02; margin-top: 24px;
    text-shadow: 5px 5px 0 var(--gold), 8px 8px 0 var(--ink);
    color: var(--card);
    -webkit-text-stroke: 2px var(--ink);
  }
  .start-btn {
    margin-top: 38px; background: var(--gold); border: 3.5px solid var(--ink);
    box-shadow: 5px 5px 0 var(--ink); padding: 15px 32px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600; font-size: 22px; display: inline-flex; align-items: center; gap: 10px;
    cursor: pointer;
  }

  /* Quiz */
  .progress-row { display: flex; gap: 6px; margin-bottom: 28px; }
  .progress-seg { flex: 1; height: 11px; border: 2.5px solid var(--ink); background: transparent; }
  .progress-seg.filled { background: var(--gold); }
  .q-panel { padding: 26px 24px; }
  .q-prompt { font-size: 27px; line-height: 1.2; margin-bottom: 22px; }
  .options-col { display: flex; flex-direction: column; gap: 12px; }
  .opt-btn-item {
    text-align: left; border: 2.5px solid var(--ink); background: var(--card);
    padding: 13px 15px; cursor: pointer; box-shadow: 3px 3px 0 var(--ink);
    font-family: 'Baloo 2', sans-serif; font-size: 16px; line-height: 1.5; font-weight: 500;
    width: 100%;
  }
  .opt-btn-item.flash { background: var(--gold); }

  /* Result */
  .result-eyebrow { font-size: 12px; letter-spacing: 2px; margin-bottom: 8px; }
  .result-hero { font-size: clamp(2.3rem, 7vw, 3.8rem); line-height: 1; }
  .result-pedagogy { font-size: 16px; letter-spacing: 1px; opacity: .75; margin-top: 8px; margin-bottom: 18px; text-align: center; }
  .desc-panel { padding: 22px 24px; margin-bottom: 28px; }
  .desc-panel p { font-size: 16px; line-height: 1.65; font-weight: 500; margin: 0; }
  .media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 640px) { .media-grid { grid-template-columns: 1fr; } }
  .media-box {
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; aspect-ratio: 9 / 16; max-width: 260px; margin: 0 auto;
  }
  .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; }
  .result-actions { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 32px; }
  .action-btn {
    border: 3px solid var(--ink); padding: 12px 22px; font-family: 'Fredoka', sans-serif;
    font-weight: 600; font-size: 17px; display: inline-flex; align-items: center; gap: 8px;
    cursor: pointer;
  }
  .action-btn.primary { background: var(--gold); box-shadow: 5px 5px 0 var(--ink); }
  .action-btn.secondary {
    background: var(--card); box-shadow: 4px 4px 0 var(--ink); font-family: 'Fredoka', sans-serif;
    font-size: 13px; font-weight: 400; letter-spacing: 1px;
  }

  /* Gallery */
  .gallery-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .close-btn {
    background: var(--card); border: 2.5px solid var(--ink); box-shadow: 3px 3px 0 var(--ink);
    padding: 6px 12px; display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Fredoka', sans-serif; font-size: 12px; cursor: pointer;
  }
  .roster-card { padding: 20px 22px; position: relative; margin-bottom: 18px; }
  .you-badge {
    position: absolute; top: -14px; right: 16px; background: var(--gold);
    border: 2.5px solid var(--ink); padding: 2px 10px; font-size: 14px; transform: rotate(3deg);
  }
  .roster-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .roster-badge {
    width: 34px; height: 34px; border-radius: 50%; border: 2.5px solid var(--ink);
    color: var(--card); display: inline-flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .roster-name { font-size: 24px; }
  .roster-ped { font-size: 11px; letter-spacing: 1px; opacity: .7; margin: 8px 0; }
  .roster-desc { font-size: 15px; line-height: 1.55; font-weight: 500; margin: 0; }
  .roster-media { display: flex; gap: 14px; margin: 14px 0 16px; flex-wrap: wrap; }
  .roster-media .media-box { max-width: 195px; margin: 0; }

  .hidden { display: none; }
</style>
</head>
<body>

<div id="app"></div>

<script>
/* ---------- DATA ---------- */

const QUESTIONS = [
  {
    prompt: "When you start a new topic, what is your #1 goal?",
    options: [
      { letter: "C", text: 'To check who is already "ready" for the topic and who needs a different path.' },
      { letter: "E", text: "To create a relaxed culture where the lesson feels more like a game." },
      { letter: "A", text: 'To grab their attention immediately so the information doesn\u2019t get "lost."' },
      { letter: "D", text: 'To get students talking to each other using specific roles like "The Predictor."' },
      { letter: "B", text: 'To connect the topic to a "Big Idea" that is timeless and universal.' },
    ],
  },
  {
    prompt: "Your students are stuck on a difficult concept or passage. What\u2019s your move?",
    options: [
      { letter: "D", text: 'One student "Clarifies" the hard words, another "Summarizes" the main idea.' },
      { letter: "B", text: 'Ask them to look past the facts and find the "Universal Principle" behind it.' },
      { letter: "E", text: 'Turn the passage into a "Fantasy" or roleplay scenario to make it come alive.' },
      { letter: "A", text: "Break it into bite-sized pieces and use mnemonics to help them remember." },
      { letter: "C", text: "Offer choices: draw their understanding, talk it out, or write a summary." },
    ],
  },
  {
    prompt: "What makes you happiest at the end of a lesson?",
    options: [
      { letter: "E", text: 'Seeing the joy that comes from students "playing" with new ideas.' },
      { letter: "A", text: 'Knowing my students can "retrieve" what they learned in a quick quiz.' },
      { letter: "D", text: "Watching students take ownership and lead their own discussion." },
      { letter: "C", text: "Every student engaged because the task hit the right degree of challenge." },
      { letter: "B", text: "Hearing a student connect a concept to a real-world event happening now." },
    ],
  },
  {
    prompt: 'If you had a teaching "Magic Wand," what would it do?',
    options: [
      { letter: "B", text: "Help students see the deep Big Ideas connecting all subjects." },
      { letter: "D", text: "Turn every class into a collaborative team where everyone has a role." },
      { letter: "A", text: "Perfectly encode information into every student\u2019s long-term memory." },
      { letter: "E", text: "Turn the whole school into a playful place where learning feels like fun." },
      { letter: "C", text: "Instantly tailor every worksheet to each student\u2019s learning profile." },
    ],
  },
  {
    prompt: "How do you want your students to describe your class?",
    options: [
      { letter: "C", text: '"The teacher really knows me and gives me work that fits."' },
      { letter: "E", text: '"Class is a place where we can be creative and just play."' },
      { letter: "B", text: '"I feel like I understand how the whole world works now."' },
      { letter: "A", text: '"I finally understand how to study and remember things!"' },
      { letter: "D", text: '"We learn so much from each other by talking together."' },
    ],
  },
];

// Replace each imageSrc and videoSrc "xx" with the real filename hosted at https://ngchb.github.io/tapas/
const RESULTS = {
  A: {
    hero: "The Memory Architect",
    pedagogy: "Information Processing Theory",
    color: "#2D6FE0",
    description:
      'You are a master of the "Memory Pipeline," focusing on how students attend to, encode, and retrieve information. Watch the video below to learn more about Information Processing Theory.',
    imageSrc: "https://ngchb.github.io/tapas/IPT.png",
    videoSrc: "https://ngchb.github.io/tapas/IPT.mp4",
  },
  B: {
    hero: "The Big-Picture Visionary",
    pedagogy: "Concept-Based Inquiry",
    color: "#16A34A",
    description:
      'You love "Big Ideas" and want students to see the "why" behind the facts through transferable, universal principles. Watch the video below to dive deeper into Concept-Based Inquiry.',
    imageSrc: "https://ngchb.github.io/tapas/IPT.png",
    videoSrc: "https://ngchb.github.io/tapas/IPT.mp4",
  },
  C: {
    hero: "The Personalizer",
    pedagogy: "Differentiated Instruction (DI)",
    color: "#9333EA",
    description:
      "Differentiated Instruction (DI) is your calling! You believe in proactively planning for different readiness levels and interests to ensure every student succeeds. Watch the video below to learn more about DI.",
    imageSrc: "https://ngchb.github.io/tapas/IPT.png",
    videoSrc: "https://ngchb.github.io/tapas/IPT.mp4",
  },
  D: {
    hero: "The Collaborative Captain",
    pedagogy: "Reciprocal Teaching",
    color: "#06B6D4",
    description:
      "Reciprocal Teaching is perfect for you. You value purposeful dialogue and want to empower students to lead their own learning through structured roles like Clarifying and Questioning. Watch the video below to see Reciprocal Teaching in action.",
    imageSrc: "https://ngchb.github.io/tapas/IPT.png",
    videoSrc: "https://ngchb.github.io/tapas/IPT.mp4",
  },
  E: {
    hero: "The Joy Seeker",
    pedagogy: "Pedagogies of Play (POP)",
    color: "#E4372B",
    description:
      'You are a champion for Pedagogies of Play (POP). You believe play is the foundation of learning and want to bring playfulness and "fantasy" into the classroom to spark creativity. Watch the video below to learn more about POP.',
    imageSrc: "https://ngchb.github.io/tapas/IPT.png",
    videoSrc: "https://ngchb.github.io/tapas/IPT.mp4",
  },
};

const LETTERS = ["A", "B", "C", "D", "E"];

/* ---------- STATE ---------- */

let screen = "landing"; // landing | quiz | result | gallery
let prevScreen = "landing";
let qIndex = 0;
let answers = [];
let flashLetter = null;

const app = document.getElementById("app");

/* ---------- ICONS (inline SVG, no dependency) ---------- */

const icon = {
  arrow: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`,
  redo: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>`,
  sparkles: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/></svg>`,
  image: `<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`,
  x: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
};

/* ---------- LOGIC ---------- */

function start() {
  answers = [];
  qIndex = 0;
  screen = "quiz";
  render();
}

function pick(letter) {
  flashLetter = letter;
  render();
  setTimeout(() => {
    flashLetter = null;
    answers.push(letter);
    if (qIndex + 1 < QUESTIONS.length) {
      qIndex += 1;
      render();
    } else {
      screen = "result";
      render();
    }
  }, 260);
}

function winner() {
  const counts = { A: 0, B: 0, C: 0, D: 0, E: 0 };
  answers.forEach((l) => (counts[l] += 1));
  let best = "A";
  LETTERS.forEach((l) => { if (counts[l] > counts[best]) best = l; });
  return best;
}

function openGallery() {
  prevScreen = screen;
  screen = "gallery";
  render();
}

function closeGallery() {
  screen = prevScreen;
  render();
}

function videoEmbed(src) {
  return `<video src="${src}" controls playsinline></video>`;
}

/* ---------- RENDER ---------- */

function render() {
  if (screen === "landing") return renderLanding();
  if (screen === "quiz") return renderQuiz();
  if (screen === "result") return renderResult();
  if (screen === "gallery") return renderGallery();
}

function renderLanding() {
  app.innerHTML = `
    <div class="halftone" style="min-height:100vh;">
      <div class="landing-bg">
        <div class="wrap landing-inner">
          <span class="mono badge">\u2605 TEACHER PROFESSIONAL DEVELOPMENT \u2605</span>
          <div class="hero-title-wrap">
            <div class="hero-burst"></div>
            <h1 class="display hero-title">WHAT'S YOUR<br/>TEACHING SUPERPOWER?</h1>
          </div>
          <p style="max-width:480px;margin-top:30px;font-size:18px;line-height:1.6;font-weight:500;">
            Five questions. One classroom identity you already have &mdash;
            you just haven't named it yet.
          </p>
          <button id="startBtn" class="opt-btn pop-btn start-btn">
            DISCOVER YOUR POWER ${icon.arrow}
          </button>
          <p class="mono" style="margin-top:20px;font-size:12px;opacity:.7;">
            5 QUESTIONS &middot; ~2 MINUTES &middot; NO CAPE REQUIRED
          </p>
        </div>
      </div>
    </div>
  `;
  document.getElementById("startBtn").addEventListener("click", start);
}

function renderQuiz() {
  const question = QUESTIONS[qIndex];
  const segments = QUESTIONS.map((_, i) =>
    `<div class="progress-seg ${i <= qIndex ? "filled" : ""}"></div>`
  ).join("");
  const options = question.options.map((opt) => `
    <button class="opt-btn opt-btn-item ${flashLetter === opt.letter ? "flash" : ""}" data-letter="${opt.letter}">
      ${opt.text}
    </button>
  `).join("");

  app.innerHTML = `
    <div class="wrap" style="padding-top:64px;">
      <div class="mono" style="font-size:12px;letter-spacing:2px;margin-bottom:10px;">
        PANEL ${qIndex + 1} OF ${QUESTIONS.length}
      </div>
      <div class="progress-row">${segments}</div>
      <div class="panel q-panel">
        <p class="display q-prompt">${question.prompt}</p>
        <div class="options-col">${options}</div>
      </div>
    </div>
  `;
  document.querySelectorAll(".opt-btn-item").forEach((btn) => {
    btn.addEventListener("click", () => pick(btn.dataset.letter));
  });
}

function renderResult() {
  const letter = winner();
  const r = RESULTS[letter];

  app.innerHTML = `
    <div class="wrap">
      <div class="mono result-eyebrow" style="color:${r.color};">\u2605 RESULT UNLOCKED \u2605</div>
      <h1 class="display result-hero" style="color:${r.color};">${r.hero}</h1>
      <p class="mono result-pedagogy">PEDAGOGY: ${r.pedagogy.toUpperCase()}</p>

      <div class="panel desc-panel"><p>${r.description}</p></div>

      <div class="media-grid">
        <div class="halftone media-box">
          <img src="${r.imageSrc}" alt="${r.imageSrc}" />
        </div>

        <div class="media-box" style="background:var(--ink);">
          ${videoEmbed(r.videoSrc)}
        </div>
      </div>

      <div class="result-actions">
        <button id="exploreBtn" class="opt-btn pop-btn action-btn primary">${icon.sparkles} MEET ALL FIVE SUPERHEROES</button>
        <button id="retakeBtn" class="opt-btn action-btn secondary">${icon.redo} RETAKE THE QUIZ</button>
      </div>
    </div>
  `;
  document.getElementById("exploreBtn").addEventListener("click", openGallery);
  document.getElementById("retakeBtn").addEventListener("click", start);
}

function renderGallery() {
  const currentLetter = answers.length === 5 ? winner() : null;
  const cards = LETTERS.map((l) => {
    const r = RESULTS[l];
    const isYou = l === currentLetter;
    return `
      <div class="panel roster-card" style="border-color:${r.color};box-shadow:6px 6px 0 ${r.color};">
        ${isYou ? `<span class="display you-badge">THAT'S YOU!</span>` : ""}
        <div class="roster-head">
          <span class="display roster-badge" style="background:${r.color};">${l}</span>
          <span class="display roster-name" style="color:${r.color};">${r.hero}</span>
        </div>
        <p class="mono roster-ped">PEDAGOGY: ${r.pedagogy.toUpperCase()}</p>
        <div class="roster-media">
          <div class="halftone media-box">
            <img src="${r.imageSrc}" alt="${r.imageSrc}" />
          </div>
          <div class="media-box" style="background:var(--ink);">
            ${videoEmbed(r.videoSrc)}
          </div>
        </div>
        <p class="roster-desc">${r.description}</p>
      </div>
    `;
  }).join("");

  app.innerHTML = `
    <div class="wrap">
      <div class="gallery-header">
        <span class="mono" style="font-size:12px;letter-spacing:2px;opacity:.75;">\u2605 THE FULL ROSTER \u2605</span>
        <button id="closeBtn" class="opt-btn close-btn">${icon.x} CLOSE</button>
      </div>
      <h2 class="display" style="font-size:clamp(2rem,6vw,3rem);margin-bottom:24px;">MEET THE FIVE SUPERHEROES</h2>
      ${cards}
    </div>
  `;
  document.getElementById("closeBtn").addEventListener("click", closeGallery);
}

render();
</script>
</body>
</html>
